# OnlineFinder Docker Compose Configuration
# A privacy-respecting metasearch engine (forked from SearXNG)

services:
  redis:
    container_name: onlinefinder-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - onlinefinder
    volumes:
      - valkey-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  onlinefinder:
    container_name: onlinefinder
    build:
      context: ./onlinefinder-source
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - onlinefinder
    volumes:
      # Main config
      - ./onlinefinder:/etc/onlinefinder:rw
      # Override images with OnlineFinder logos (if needed)
      - ./onlinefinder-source/olf/static/themes/simple/img/onlinefinder.svg:/usr/local/onlinefinder/olf/static/themes/simple/img/onlinefinder.svg:ro
      - ./onlinefinder-source/olf/static/themes/simple/img/onlinefinder.png:/usr/local/onlinefinder/olf/static/themes/simple/img/onlinefinder.png:ro
      # Override templates with OnlineFinder branding (if needed)
      - ./onlinefinder-source/olf/templates/simple/base.html:/usr/local/onlinefinder/olf/templates/simple/base.html:ro
      - ./onlinefinder-source/olf/templates/simple/index.html:/usr/local/onlinefinder/olf/templates/simple/index.html:ro
      - ./onlinefinder-source/olf/templates/simple/info.html:/usr/local/onlinefinder/olf/templates/simple/info.html:ro
      - ./onlinefinder-source/olf/templates/simple/results.html:/usr/local/onlinefinder/olf/templates/simple/results.html:ro
      - ./onlinefinder-source/olf/templates/simple/new_issue.html:/usr/local/onlinefinder/olf/templates/simple/new_issue.html:ro
      # Override infopage content (if needed)
      - ./onlinefinder-source/olf/infopage/en/about.md:/usr/local/onlinefinder/olf/infopage/en/about.md:ro
      - ./onlinefinder-source/olf/infopage/en/donate.md:/usr/local/onlinefinder/olf/infopage/en/donate.md:ro
      - ./onlinefinder-source/olf/infopage/__init__.py:/usr/local/onlinefinder/olf/infopage/__init__.py:ro
      # Data volume
      - onlinefinder-data:/var/cache/onlinefinder:rw
    environment:
      # LOCAL DEVELOPMENT: Use localhost
      - ONLINEFINDER_BASE_URL=http://localhost/
      # PRODUCTION: Uncomment the line below and comment the line above
      # - ONLINEFINDER_BASE_URL=https://onlinefinder.com/
      - ONLINEFINDER_SETTINGS_PATH=/etc/onlinefinder/settings.yml
      - INSTANCE_NAME=OnlineFinder
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  caddy:
    container_name: onlinefinder-caddy
    image: docker.io/caddy/caddy:latest
    restart: unless-stopped
    networks:
      - onlinefinder
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      # LOCAL DEVELOPMENT: Comment out domain configuration
      # PRODUCTION: Uncomment these lines and uncomment the domain block in Caddyfile
      # - ONLINEFINDER_HOSTNAME=onlinefinder.com
      # - ONLINEFINDER_TLS=onlinefinder.com
      - LETSENCRYPT_EMAIL=accounts@southeastservers.com
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  onlinefinder:

volumes:
  valkey-data:
  onlinefinder-data:
  caddy-data:
  caddy-config:
